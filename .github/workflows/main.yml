name: SIMMACI CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/simmaci-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/simmaci-frontend

jobs:
  # 1. ── Backend CI (Tests) ───────────────────────────────
  backend-test:
    name: "Backend CI (PHP 8.3)"
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: sim_maarif_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, bcmath, gd, zip
        coverage: none

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Create .env
      run: |
        cp .env.example .env
        sed -i 's/DB_CONNECTION=pgsql/DB_CONNECTION=pgsql/' .env
        sed -i 's/DB_DATABASE=sim_maarif/DB_DATABASE=sim_maarif_test/' .env
        sed -i 's/DB_USERNAME=.*/DB_USERNAME=postgres/' .env
        sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=secret/' .env
        sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
        php artisan key:generate

    - name: Run Migrations
      run: php artisan migrate --force

    - name: Execute Tests
      run: php artisan test

  # 2. ── Frontend CI (Build Verification) ────────────────
  frontend-build:
    name: "Frontend CI (Node 20)"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Linting
      run: npm run lint
      continue-on-error: true

    - name: Production Build
      run: npm run build
      env:
        VITE_API_URL: "https://api.example.com"

  # 3. ── Build & Push Docker Images ──────────────────────
  # This job only runs if tests pass on the main branch
  build-and-push:
    name: "Build & Push Docker"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.IMAGE_BACKEND }}
          ${{ env.IMAGE_FRONTEND }}

    # Backend Image
    - name: Build and Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.IMAGE_BACKEND }}:latest
          ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}

    # Frontend Image (Root context)
    - name: Build and Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE_FRONTEND }}:latest
          ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}

