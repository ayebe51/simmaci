services:
  # Database Service (PostgreSQL)
  db:
      image: postgres:16-alpine
      container_name: simmaci-db
      restart: always
      environment:
          POSTGRES_DB: ${DB_DATABASE:-sim_maarif}
          POSTGRES_USER: ${DB_USERNAME:-sim_user}
          POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      volumes:
          - postgres-data:/var/lib/postgresql/data
      ports:
          - "5433:5432"
      networks:
          - simmaci-network

  # Backend Service (Laravel 12)
  backend:
      build:
          context: ./backend
          dockerfile: Dockerfile
      container_name: simmaci-backend
      restart: always
      depends_on:
          - db
      environment:
          - APP_NAME=SIM Maarif
          - APP_ENV=local
          - APP_DEBUG=true
          - APP_URL=http://localhost
          - DB_CONNECTION=pgsql
          - DB_HOST=db
          - DB_PORT=5432
          - DB_DATABASE=${DB_DATABASE:-sim_maarif}
          - DB_USERNAME=${DB_USERNAME:-sim_user}
          - DB_PASSWORD=${DB_PASSWORD:-secret}
          - SESSION_DRIVER=file
          - CACHE_STORE=file
          - QUEUE_CONNECTION=sync
          - LOG_CHANNEL=stack
          - SANCTUM_STATEFUL_DOMAINS=localhost
          - CORS_ALLOWED_ORIGINS=http://localhost
      volumes:
          - ./backend:/var/www/html
      networks:
          - simmaci-network

  # Frontend Service (React + Vite)
  frontend:
      build:
          context: .
          dockerfile: Dockerfile
      container_name: simmaci-frontend
      restart: always
      depends_on:
          - backend
      ports:
          - "80:80"
      networks:
          - simmaci-network

networks:
  simmaci-network:
      driver: bridge

volumes:
  postgres-data:
      driver: local

