services:
  # Database Service (PostgreSQL)
  db:
      image: postgres:16-alpine
      container_name: simmaci-db
      restart: always
      environment:
          POSTGRES_DB: ${DB_DATABASE:-sim_maarif}
          POSTGRES_USER: ${DB_USERNAME:-sim_user}
          POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      volumes:
          - postgres-data:/var/lib/postgresql/data
      ports:
          - "5433:5432"
      networks:
          - simmaci-network

  # Backend Service (Laravel 12)
  backend:
      build:
          context: ./backend
          dockerfile: Dockerfile
      container_name: simmaci-backend
      restart: always
      depends_on:
          - db
          - redis
          - minio
      environment:
          - APP_NAME=SIM Maarif
          - APP_ENV=local
          - APP_DEBUG=true
          - APP_URL=http://localhost
          - DB_CONNECTION=pgsql
          - DB_HOST=db
          - DB_PORT=5432
          - DB_DATABASE=${DB_DATABASE:-sim_maarif}
          - DB_USERNAME=${DB_USERNAME:-sim_user}
          - DB_PASSWORD=${DB_PASSWORD:-secret}
          - SESSION_DRIVER=redis
          - CACHE_STORE=redis
          - QUEUE_CONNECTION=redis
          - REDIS_HOST=redis
          - FILESYSTEM_DISK=s3
          - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
          - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
          - AWS_DEFAULT_REGION=us-east-1
          - AWS_BUCKET=simmaci-storage
          - AWS_ENDPOINT=http://minio:9000
          - AWS_USE_PATH_STYLE_ENDPOINT=true
          - LOG_CHANNEL=stack
          - SANCTUM_STATEFUL_DOMAINS=localhost
          - CORS_ALLOWED_ORIGINS=http://localhost
      volumes:
          - ./backend:/var/www/html
          - backend_vendor:/var/www/html/vendor
      networks:
          - simmaci-network

  # Frontend Service (React + Vite)
  frontend:
      build:
          context: .
          dockerfile: Dockerfile
      container_name: simmaci-frontend
      restart: always
      depends_on:
          - backend
      ports:
          - "80:80"
      networks:
          - simmaci-network

  # Redis Service
  redis:
      image: redis:7-alpine
      container_name: simmaci-redis
      restart: always
      volumes:
          - redis-data:/data
      networks:
          - simmaci-network

  # MinIO Service (S3 Compatible Storage)
  minio:
      image: minio/minio
      container_name: simmaci-minio
      restart: always
      environment:
          MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
          MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      volumes:
          - minio-data:/data
      ports:
          - "9000:9000"
          - "9001:9001"
      command: server /data --console-address ":9001"
      networks:
          - simmaci-network

  # Automatic Bucket Creator
  createbuckets:
      image: minio/mc
      container_name: simmaci-mc
      depends_on:
          - minio
      networks:
          - simmaci-network
      entrypoint: >
          /bin/sh -c "
          /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
          /usr/bin/mc mb --ignore-existing local/simmaci-storage;
          /usr/bin/mc anonymous set public local/simmaci-storage;
          exit 0;
          "

networks:
  simmaci-network:
      driver: bridge

volumes:
  postgres-data:
      driver: local
  redis-data:
      driver: local
  minio-data:
      driver: local
  backend_vendor:

