services:
  postgres:
    image: postgres:16-alpine
    container_name: simmaci_postgres
    environment:
      POSTGRES_DB: sim_maarif
      POSTGRES_USER: sim_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: simmaci_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
