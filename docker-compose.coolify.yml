# Docker Compose untuk deployment di Coolify
# Gunakan file ini sebagai "Docker Compose" source di Coolify
# Isi environment variables di Coolify dashboard (bukan di file ini)

services:
  # ── Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: simmaci-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sim_maarif}
      POSTGRES_USER: ${DB_USERNAME:-sim_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - simmaci-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sim_user} -d ${DB_DATABASE:-sim_maarif}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: simmaci-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - simmaci-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ─────────────────────────
  minio:
    image: minio/minio
    container_name: simmaci-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - simmaci-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO bucket setup (runs once) ────────────────────────
  createbuckets:
    image: minio/mc
    container_name: simmaci-mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - simmaci-network
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing local/simmaci-storage;
      /usr/bin/mc anonymous set public local/simmaci-storage;
      exit 0;
      "

  # ── Backend (Laravel) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simmaci-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APP_NAME: "SIM Maarif"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://api.simmaci.com
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-sim_maarif}
      DB_USERNAME: ${DB_USERNAME:-sim_user}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: simmaci-storage
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: ${MINIO_PUBLIC_URL}
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      LOG_CHANNEL: stderr
      SANCTUM_STATEFUL_DOMAINS: simmaci.com
      CORS_ALLOWED_ORIGINS: https://simmaci.com
    networks:
      - simmaci-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.simmaci.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=80"
      - "traefik.http.services.backend.loadbalancer.serversTransport=backend-transport"
      - "traefik.http.serversTransports.backend-transport.respondingTimeouts.idleConnTimeout=60s"
      - "traefik.http.serversTransports.backend-transport.respondingTimeouts.readTimeout=60s"
      - "traefik.http.serversTransports.backend-transport.respondingTimeouts.writeTimeout=60s"

  # ── Frontend (React + Nginx) ───────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_STORAGE_URL: https://simmaci.com/simmaci-storage
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: simmaci-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend
      MINIO_URL: http://minio:9000
    expose:
      - "80"
    networks:
      - simmaci-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`simmaci.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  simmaci-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
